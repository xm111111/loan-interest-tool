<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贷款提款垫付利息管理</title>
<link rel="stylesheet" href="flatpickr.min.css">
<script src="flatpickr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
<style>
:root{--primary:#6366f1;--primary-light:#818cf8;--accent:#10b981;--accent-light:#34d399;--warning:#f59e0b;--danger:#ef4444;--bg-dark:#0f172a;--bg-card:#1e293b;--bg-hover:#334155;--bg-input:#0f172a;--text:#f1f5f9;--text-muted:#94a3b8;--border:#334155;--gradient-primary:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);--gradient-success:linear-gradient(135deg,#10b981 0%,#34d399 100%);--gradient-danger:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg-dark);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:30px 20px}
.header{text-align:center;margin-bottom:35px}
.header h1{font-size:2.4rem;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:var(--text-muted)}
.form-card{background:var(--bg-card);border-radius:24px;padding:32px;margin-bottom:30px;border:1px solid var(--border)}
.form-title{font-size:1.1rem;font-weight:600;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.form-title::before{content:"";width:4px;height:24px;background:var(--gradient-primary);border-radius:2px}
.form-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-size:0.85rem;color:var(--text-muted);font-weight:500;text-align:center}
.form-group input{background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:1rem;text-align:center}
.form-group input:focus{outline:none;border-color:var(--primary)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.btn-primary{background:var(--gradient-primary);color:white;border:none;border-radius:12px;padding:14px 32px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:24px}
.form-actions{text-align:center}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.section-title{font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:10px}
.section-title::before{content:"";width:4px;height:22px;background:var(--gradient-success);border-radius:2px}
.section-right{display:flex;align-items:center;gap:12px}
.record-count{background:var(--bg-card);padding:8px 16px;border-radius:20px;font-size:0.9rem;color:var(--text-muted);border:1px solid var(--border)}
.record-count span{color:var(--primary-light);font-weight:700}
.select-all-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.85rem}
.export-btn{background:linear-gradient(135deg,#10b981,#34d399);border:none;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.85rem;font-weight:600}
.export-btn:hover{opacity:0.9}
.btn-batch-del{background:rgba(239,68,68,0.15);border:1px solid var(--danger);color:var(--danger);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.85rem;display:none}
.btn-batch-del.show{display:inline-flex;align-items:center;gap:6px}
.table-container{background:var(--bg-card);border-radius:24px;overflow:hidden;border:none}
.data-table{width:100%;border-collapse:separate;border-spacing:0}
.data-table th{background:rgba(15,23,42,0.8);padding:16px 12px;text-align:center;font-weight:600;font-size:0.8rem;color:var(--text-muted);border:none}
.data-table td{padding:16px 12px;text-align:center;border:none;font-size:0.95rem}
.amount{font-weight:700;color:var(--primary-light)}
.rate{color:var(--warning);font-weight:600}
.danger-text{color:var(--danger)}
.success-text{color:var(--accent)}
.days-tag{display:inline-block;background:rgba(99,102,241,0.15);color:var(--primary-light);padding:2px 8px;border-radius:10px;font-size:0.75rem;margin-top:4px}
.row-cb{width:18px;height:18px;cursor:pointer;accent-color:var(--primary)}
.repaid-row{background:linear-gradient(90deg,rgba(16,185,129,0.35),rgba(52,211,153,0.2))!important;border-left:5px solid var(--accent)}
.repaid-btn{background:transparent;border:2px solid var(--border);color:var(--text-muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:700;min-width:40px}
.repaid-btn:hover{border-color:var(--accent);color:var(--accent)}
.repaid-btn.active{background:var(--gradient-success);border-color:var(--accent);color:white}
.edit-btn,.del-btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem;border:1px solid}
.edit-btn{border-color:var(--primary);color:var(--primary-light)}
.edit-btn:hover{background:var(--primary);color:white}
.del-btn{border-color:var(--border);color:var(--text-muted)}
.del-btn:hover{background:var(--danger);border-color:var(--danger);color:white}
.total-row{background:linear-gradient(90deg,rgba(99,102,241,0.2),rgba(139,92,246,0.1))!important;font-weight:700}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:2000}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-radius:24px;padding:32px;width:90%;max-width:520px;border:1px solid var(--border)}
.modal-title{font-size:1.2rem;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.modal-title::before{content:"";width:4px;height:24px;background:var(--gradient-primary);border-radius:2px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-grid input{background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:1rem;text-align:center;width:100%}
.modal-buttons{display:flex;gap:12px;margin-top:24px}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:12px 24px;border-radius:12px;cursor:pointer;font-size:0.95rem;flex:1}
.btn-save{background:var(--gradient-primary);color:white;border:none;padding:12px 24px;border-radius:12px;cursor:pointer;font-size:0.95rem;font-weight:600;flex:2}
.toast{position:fixed;bottom:30px;right:30px;background:var(--gradient-success);color:white;padding:14px 24px;border-radius:12px;font-weight:600;transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:3000}
.toast.show{transform:translateY(0);opacity:1}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:5000}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--bg-card);border-radius:20px;padding:32px;width:90%;max-width:400px;border:1px solid var(--border);text-align:center}
.confirm-icon{width:60px;height:60px;margin:0 auto 20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;background:rgba(239,68,68,0.15)}
.confirm-message{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:8px}
.confirm-sub{font-size:0.9rem;color:var(--text-muted);margin-bottom:24px}
.confirm-buttons{display:flex;gap:12px}
.confirm-btn{flex:1;padding:12px 20px;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;border:none}
.confirm-btn.cancel{background:var(--bg-hover);color:var(--text-muted)}
.confirm-btn.ok{background:var(--gradient-danger);color:white}
</style>
</head>
<body>
<div class="container">
<header class="header"><h1>贷款提款垫付利息管理</h1><p>快速录入与管理贷款垫付利息数据</p></header>
<div class="form-card">
<h2 class="form-title">录入信息</h2>
<form id="loanForm">
<div class="form-grid">
<div class="form-group"><label>客户姓名</label><input type="text" id="name" placeholder="请输入客户姓名" required></div>
<div class="form-group"><label>提款日期</label><input type="text" id="withdrawDate" class="datepicker" placeholder="选择日期" required></div>
<div class="form-group"><label>提款金额</label><input type="number" id="withdrawAmount" step="0.01" min="0" placeholder="如：100000" required></div>
<div class="form-group"><label>期限（月数）</label><input type="number" id="termMonths" min="1" placeholder="如：12" required></div>
<div class="form-group"><label>年利率（%）</label><input type="number" id="annualRate" step="0.001" min="0" placeholder="如：4.350" required></div>
</div>
<div class="form-actions"><button type="submit" class="btn-primary">保存记录</button></div>
</form>
</div>
<div class="data-section">
<div class="section-header">
<div class="section-title">已录入数据</div>
<div class="section-right">
<span class="record-count">共 <span id="totalCount">0</span> 条</span>
<button class="export-btn" onclick="exportData()">导出数据</button>
<button class="select-all-btn" id="selectAllBtn" onclick="toggleSelectAll()">全选</button>
<button class="btn-batch-del" id="batchDelBtn" onclick="doBatchDelete()">批量删除 (<span id="selCount">0</span>)</button>
</div>
</div>
<div class="table-container">
<table class="data-table">
<thead><tr><th style="width:50px"><input type="checkbox" class="row-cb" id="selectAllCb" onchange="toggleSelectAll()"></th><th>序号</th><th>客户姓名</th><th>提款日期</th><th>提款金额</th><th>年利率</th><th>到期日</th><th>实际还款日</th><th>垫付利息(差额)</th><th>到期日利息(天数)</th><th>实际还款利息(天数)</th><th>是否已偿还</th><th>操作</th></tr></thead>
<tbody id="dataTable"></tbody>
</table>
</div>
</div>
</div>
<div class="modal-overlay" id="editModal">
<div class="modal">
<h3 class="modal-title">修改记录</h3>
<form id="editForm">
<input type="hidden" id="editIndex">
<div class="modal-grid">
<div class="form-group"><label>客户姓名</label><input type="text" id="editName" required></div>
<div class="form-group"><label>提款日期</label><input type="text" id="editWithdrawDate" class="datepicker" required></div>
<div class="form-group"><label>提款金额</label><input type="number" id="editWithdrawAmount" step="0.01" min="0" required></div>
<div class="form-group"><label>期限（月数）</label><input type="number" id="editTermMonths" min="1" required></div>
<div class="form-group"><label>年利率（%）</label><input type="number" id="editAnnualRate" step="0.001" min="0" required></div>
<div class="form-group"><label>实际还款日</label><input type="text" id="editRepayDate" class="datepicker"></div>
<div class="form-group"><label>垫付利息</label><input type="number" id="editAdvanceInterest" step="0.01" min="0" placeholder="可留空"></div>
</div>
<div class="modal-buttons"><button type="button" class="btn-cancel" onclick="closeModal()">取消</button><button type="submit" class="btn-save">保存修改</button></div>
</form>
</div>
</div>
<div class="confirm-overlay" id="confirmDialog">
<div class="confirm-box">
<div class="confirm-icon">!</div>
<div class="confirm-message" id="confirmMessage">确定要删除吗？</div>
<div class="confirm-sub" id="confirmSub"></div>
<div class="confirm-buttons">
<button class="confirm-btn cancel" onclick="closeConfirm()">取消</button>
<button class="confirm-btn ok" id="confirmOkBtn" onclick="doConfirm()">确定</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
var records=JSON.parse(localStorage.getItem("loanRecords")||"[]");
var selectedRows=new Set();
var confirmCallback=null;
function calcDays(d,m){var s=new Date(d+"T00:00:00");var e=new Date(s.getFullYear(),s.getMonth()+m,s.getDate());return Math.ceil((e-s)/86400000);}
function getMaturity(d,m){var s=new Date(d+"T00:00:00");var e=new Date(s.getFullYear(),s.getMonth()+m,s.getDate());return e.getFullYear()+"/"+String(e.getMonth()+1).padStart(2,"0")+"/"+String(e.getDate()).padStart(2,"0");}
function fmtDate(d){if(!d)return"-";var dd=new Date(d+"T00:00:00");return dd.getFullYear()+"/"+String(dd.getMonth()+1).padStart(2,"0")+"/"+String(dd.getDate()).padStart(2,"0");}
function fmtMoney(n){var v=parseFloat(n);if(isNaN(v)||v===0)return"-";return v.toLocaleString("zh-CN",{minimumFractionDigits:2,maximumFractionDigits:2});}
function calcInt(a,r,d){return(a*r/100/360*d).toFixed(2);}
function calcDaysBetween(f,t){var s=new Date(f+"T00:00:00");var e=new Date(t+"T00:00:00");return Math.ceil((e-s)/86400000);}
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";setTimeout(function(){t.className="toast"},2200);}
function showConfirm(msg,sub,cb){document.getElementById("confirmMessage").textContent=msg;document.getElementById("confirmSub").textContent=sub||"";confirmCallback=cb;document.getElementById("confirmDialog").className="confirm-overlay show";}
function closeConfirm(){document.getElementById("confirmDialog").className="confirm-overlay";confirmCallback=null;}
function doConfirm(){if(confirmCallback)confirmCallback();closeConfirm();}
function renderTotal(){
if(records.length===0)return"";
var ta=0,tad=0,ti=0,trep=0;
records.forEach(function(r){ta+=parseFloat(r.withdrawAmount)||0;tad+=parseFloat(r.advanceInterest)||0;ti+=parseFloat(r.actualInterest)||0;
if(r.repayDate){var rd=calcDaysBetween(r.withdrawDate,r.repayDate);trep+=parseFloat(calcInt(r.withdrawAmount,r.annualRate,rd));}});
return'<tr class="total-row"><td colspan="4" style="text-align:center">合计</td><td class="amount">'+fmtMoney(ta)+'</td><td>-</td><td>-</td><td>-</td><td class="amount">'+(tad>0?fmtMoney(tad):"-")+'</td><td class="amount">'+fmtMoney(ti)+'</td><td class="amount">'+(trep>0?fmtMoney(trep):"-")+'</td><td colspan="2">-</td></tr>';}
function toggleSelectAll(){var cb=document.getElementById("selectAllCb");if(selectedRows.size===records.length&&records.length>0){selectedRows.clear();cb.checked=false;document.getElementById("selectAllBtn").textContent="全选";}else{selectedRows.clear();records.forEach(function(_,i){selectedRows.add(i);});cb.checked=true;document.getElementById("selectAllBtn").textContent="取消全选";}updateBatchBtn();renderTable();}
function toggleRow(i,c){if(c)selectedRows.add(i);else selectedRows.delete(i);updateBatchBtn();syncState();renderTable();}
function syncState(){var cb=document.getElementById("selectAllCb");var btn=document.getElementById("selectAllBtn");if(records.length>0&&selectedRows.size===records.length){cb.checked=true;btn.textContent="取消全选";}else{cb.checked=false;btn.textContent="全选";}}
function updateBatchBtn(){var btn=document.getElementById("batchDelBtn");var sp=document.getElementById("selCount");if(selectedRows.size>0){btn.className="btn-batch-del show";sp.textContent=selectedRows.size;}else{btn.className="btn-batch-del";}}
function doBatchDelete(){if(selectedRows.size===0)return;showConfirm("批量删除","确定要删除选中的"+selectedRows.size+"条记录吗？",function(){var sorted=[...selectedRows].sort(function(a,b){return b-a;});sorted.forEach(function(i){records.splice(i,1);});selectedRows.clear();localStorage.setItem("loanRecords",JSON.stringify(records));updateBatchBtn();syncState();renderTable();showToast("已批量删除"+sorted.length+"条");});}
function renderTable(){
var tbody=document.getElementById("dataTable");
var countEl=document.getElementById("totalCount");
countEl.textContent=records.length;
if(records.length===0){tbody.innerHTML='<tr><td colspan="13" style="text-align:center;padding:60px;color:var(--text-muted)">暂无数据</td></tr>';updateBatchBtn();syncState();return;}
var html=records.map(function(r,i){
var days=calcDays(r.withdrawDate,r.termMonths);
var maturity=getMaturity(r.withdrawDate,r.termMonths);
var mi=parseFloat(r.actualInterest)||0;
var adv=parseFloat(r.advanceInterest)||0;
var repaid=r.repaid||false;
var sel=selectedRows.has(i);
var rd=r.repayDate||"";
var rdays=0,rint=0;
if(rd){rdays=calcDaysBetween(r.withdrawDate,rd);rint=parseFloat(calcInt(r.withdrawAmount,r.annualRate,rdays));}
var diffHtml="";
if(adv>0&&rint>0){var diff=(adv-rint).toFixed(2);var dv=parseFloat(diff);var dc=dv>0?"success-text":(dv<0?"danger-text":"");diffHtml='<br><span class="'+dc+'" style="font-size:0.75rem">('+(dv>0?"+":"")+fmtMoney(diff)+')</span>';}
return'<tr class="'+(repaid?"repaid-row ":"")+(sel?"selected ":"")+'"><td><input type="checkbox" class="row-cb" '+(sel?'checked':'')+' onchange="toggleRow('+i+',this.checked)"></td><td>'+(i+1)+'</td><td>'+r.name+'</td><td>'+fmtDate(r.withdrawDate)+'</td><td class="amount">'+fmtMoney(r.withdrawAmount)+'</td><td class="rate">'+parseFloat(r.annualRate).toFixed(3)+'%</td><td>'+maturity+'</td><td>'+fmtDate(rd)+'</td><td class="amount">'+(adv>0?fmtMoney(adv):"-")+diffHtml+'</td><td class="amount">'+fmtMoney(mi)+'<br><span class="days-tag">'+days+'天</span></td><td class="amount">'+(rint>0?fmtMoney(rint):"-")+'<br>'+(rdays>0?'<span class="days-tag">'+rdays+'天</span>':'')+'</td><td><button class="repaid-btn '+(repaid?'active':'')+'" onclick="toggleRepaid('+i+')">'+(repaid?'✓':'✗')+'</button></td><td><button class="edit-btn" onclick="openEdit('+i+')">修改</button><button class="del-btn" onclick="doDelete('+i+')">删除</button></td></tr>';}).join("");
tbody.innerHTML=html+renderTotal();
updateBatchBtn();syncState();}
document.getElementById("loanForm").addEventListener("submit",function(e){e.preventDefault();
var wd=document.getElementById("withdrawDate").value;
var tm=parseInt(document.getElementById("termMonths").value);
var wa=parseFloat(document.getElementById("withdrawAmount").value);
var ar=parseFloat(document.getElementById("annualRate").value);
var days=calcDays(wd,tm);
var rec={name:document.getElementById("name").value.trim(),withdrawDate:wd,withdrawAmount:wa,annualRate:ar,termMonths:tm,advanceInterest:0,actualInterest:calcInt(wa,ar,days),repayDate:"",repaid:false,createdAt:new Date().toISOString()};
records.unshift(rec);
localStorage.setItem("loanRecords",JSON.stringify(records));
renderTable();
showToast("保存成功！");
this.reset();});
function toggleRepaid(i){var isR=!records[i].repaid;records[i].repaid=isR;
if(isR&&!records[i].repayDate){var t=new Date();records[i].repayDate=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");var rd=calcDaysBetween(records[i].withdrawDate,records[i].repayDate);records[i].repaidInterest=calcInt(records[i].withdrawAmount,records[i].annualRate,rd);}
localStorage.setItem("loanRecords",JSON.stringify(records));renderTable();showToast(isR?"已标记为已偿还":"已取消偿还标记");}
function openEdit(i){var r=records[i];document.getElementById("editIndex").value=i;document.getElementById("editName").value=r.name;document.getElementById("editWithdrawDate").value=r.withdrawDate;document.getElementById("editWithdrawAmount").value=r.withdrawAmount;document.getElementById("editTermMonths").value=r.termMonths;document.getElementById("editAnnualRate").value=r.annualRate;document.getElementById("editRepayDate").value=r.repayDate||"";document.getElementById("editAdvanceInterest").value=r.advanceInterest>0?r.advanceInterest:"";document.getElementById("editModal").className="modal-overlay show";}
function closeModal(){document.getElementById("editModal").className="modal-overlay";}
document.getElementById("editForm").addEventListener("submit",function(e){e.preventDefault();
var i=parseInt(document.getElementById("editIndex").value);
var wd=document.getElementById("editWithdrawDate").value;
var tm=parseInt(document.getElementById("editTermMonths").value);
var wa=parseFloat(document.getElementById("editWithdrawAmount").value);
var ar=parseFloat(document.getElementById("editAnnualRate").value);
var rp=document.getElementById("editRepayDate").value;
var ad=parseFloat(document.getElementById("editAdvanceInterest").value)||0;
var days=calcDays(wd,tm);
records[i]={...records[i],name:document.getElementById("editName").value.trim(),withdrawDate:wd,withdrawAmount:wa,annualRate:ar,termMonths:tm,repayDate:rp,advanceInterest:ad,actualInterest:calcInt(wa,ar,days)};
localStorage.setItem("loanRecords",JSON.stringify(records));renderTable();closeModal();showToast("修改成功！");});
function doDelete(i){showConfirm("删除记录","确定要删除这条记录吗？",function(){selectedRows.delete(i);records.splice(i,1);localStorage.setItem("loanRecords",JSON.stringify(records));updateBatchBtn();syncState();renderTable();showToast("已删除");});}
var fileHandle=null;
async function exportData(){
var data=records.map(function(r){
var maturity=new Date(new Date(r.withdrawDate+"T00:00:00").getFullYear(),new Date(r.withdrawDate+"T00:00:00").getMonth()+r.termMonths,new Date(r.withdrawDate+"T00:00:00").getDate());
return{
name:r.name,
withdrawDate:r.withdrawDate,
withdrawAmount:r.withdrawAmount,
annualRate:r.annualRate,
termMonths:r.termMonths,
maturityDate:maturity.getFullYear()+"-"+String(maturity.getMonth()+1).padStart(2,"0")+"-"+String(maturity.getDate()).padStart(2,"0"),
advanceInterest:r.advanceInterest||0,
repayDate:r.repayDate||"",
repaid:r.repaid||false
};
});
var jsonStr=JSON.stringify(data,null,2);
try{
if(window.showSaveFilePicker){
if(!fileHandle){
fileHandle=await window.showSaveFilePicker({
suggestedName:"loan-records.json",
types:[{description:"JSON文件",accept:{"application/json":[".json"]}}]
});
}
var writable=await fileHandle.createWritable();
await writable.write(jsonStr);
await writable.close();
showToast("数据已自动保存！");
}else{
var blob=new Blob([jsonStr],{type:"application/json"});
var a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="loan-records.json";
a.click();
showToast("数据已导出，请保存文件");
}
}catch(e){
if(e.name!=="AbortError"){
var blob=new Blob([jsonStr],{type:"application/json"});
var a=document.createElement("a");
